name: Weekly Newsletter

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 8am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit memory.db and newsletter markdown back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Run newsletter pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python -m agent.pipeline

      - name: Commit updated memory and newsletter
        run: |
          git config user.name "newsletter-agent[bot]"
          git config user.email "newsletter-agent@users.noreply.github.com"
          git add data/memory.db newsletters/
          git diff --staged --quiet || git commit -m "chore: newsletter run $(date -u +%Y-%m-%d)"
          git push
